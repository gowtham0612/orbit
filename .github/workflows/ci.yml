name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Vet
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build server
        run: go build -o /tmp/orbit ./cmd/server

      - name: Build bench
        run: go build -o /tmp/bench ./cmd/bench

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Start Orbit server
        run: |
          go run ./cmd/server &
          sleep 2
        env:
          PORT: 8080
          REDIS_URL: redis://localhost:6379

      - name: Run integration test (raw WebSocket)
        run: node tests/ws-pubsub.test.js

      - name: Run integration test (Orbit SDK)
        run: node tests/sdk-presence.test.js
